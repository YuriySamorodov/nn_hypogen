services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      ENABLE_OCR: "true"
    depends_on:
      - qdrant
    volumes:
      - ./exports:/app/exports

volumes:
  qdrant_storage:
